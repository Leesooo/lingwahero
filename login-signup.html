<!DOCTYPE html>
<html lang="fil">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingwahero · Mag-sign In / Mag-sign Up</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: linear-gradient(135deg, #0038A8 0%, #002272 50%, #9a0d1b 100%);
      min-height: 100vh;
    }
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }
    .bg-animation span {
      position: absolute;
      display: block;
      background: rgba(252, 209, 22, 0.08);
      border-radius: 50%;
      animation: float 20s infinite linear;
      pointer-events: none;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.5; }
      90% { opacity: 0.5; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }
    .landing-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .landing-card {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.6s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card-hero {
      background: linear-gradient(135deg, #CE1126 0%, #0038A8 100%);
      padding: 48px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card-hero::before {
      content: "★";
      position: absolute;
      top: -30px;
      right: -30px;
      font-size: 140px;
      opacity: 0.1;
      color: #FCD116;
      pointer-events: none;
    }
    .hero-icon {
      font-size: 64px;
      color: #FCD116;
      margin-bottom: 16px;
      display: inline-block;
      animation: spin 8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .card-hero h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 32px;
      font-weight: 900;
      color: white;
      margin-bottom: 8px;
    }
    .card-hero p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }
    .flag-strip {
      width: 80px;
      height: 4px;
      background: linear-gradient(90deg, #0038A8 33%, #CE1126 33% 67%, #FCD116 67%);
      margin: 16px auto 0;
      border-radius: 2px;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid #e8d8c8;
      background: white;
    }
    .tab-btn {
      flex: 1;
      padding: 18px;
      background: none;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: #8a7060;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .tab-btn.active {
      color: #CE1126;
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 3px;
      background: #CE1126;
    }
    .form-container {
      padding: 32px;
    }
    .form {
      display: none;
    }
    .form.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #4a3728;
      margin-bottom: 8px;
    }
    .input-wrapper {
      display: flex;
      align-items: center;
      background: #f5f0ea;
      border: 1px solid #e8d8c8;
      border-radius: 16px;
      padding: 0 16px;
      transition: all 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: #0038A8;
      box-shadow: 0 0 0 3px rgba(0, 56, 168, 0.1);
    }
    .input-wrapper i {
      color: #8a7060;
      font-size: 14px;
    }
    .input-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 14px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      color: #1a1206;
    }
    .error-message {
      font-size: 12px;
      color: #CE1126;
      margin-top: 6px;
      min-height: 18px;
    }
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #CE1126, #9a0d1b);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(206, 17, 38, 0.3);
    }
    .demo-note {
      background: #FFF8F0;
      border-left: 4px solid #FCD116;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 12px;
      color: #4a3728;
    }
    .demo-note i {
      color: #FCD116;
      margin-right: 8px;
    }
    .switch-text {
      text-align: center;
      font-size: 13px;
      color: #8a7060;
      margin-top: 20px;
    }
    .switch-text a {
      color: #0038A8;
      font-weight: 600;
      cursor: pointer;
    }
    .guest-mode {
      text-align: center;
      padding: 16px 32px 24px;
      background: white;
      border-top: 1px solid #e8d8c8;
    }
    .guest-btn {
      background: transparent;
      border: 2px solid #e8d8c8;
      color: #4a3728;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    .guest-btn:hover {
      border-color: #0038A8;
      color: #0038A8;
    }
    .dark-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
    }
    .dark-toggle-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }
    @media (max-width: 480px) {
      .card-hero { padding: 32px 24px; }
      .card-hero h1 { font-size: 24px; }
      .form-container { padding: 24px; }
    }
  </style>
</head>
<body>

<div class="dark-toggle">
  <button class="dark-toggle-btn" id="darkModeToggle"><i class="fas fa-moon"></i></button>
</div>

<div class="bg-animation" id="bgAnimation"></div>

<div class="landing-container">
  <div class="landing-card">
    <div class="card-hero">
      <div class="hero-icon">☀</div>
      <h1>Lingwahero</h1>
      <p>Diksiyonaryong Makabayan</p>
      <div class="flag-strip"></div>
    </div>

    <div class="auth-tabs">
      <button class="tab-btn active" id="loginTabBtn">Mag-sign In</button>
      <button class="tab-btn" id="signupTabBtn">Mag-sign Up</button>
    </div>

    <div class="form-container">
      <div id="loginForm" class="form active">
        <div class="demo-note">
          <i class="fas fa-info-circle"></i>
          <span>Gumawa ng account para ma-save ang iyong mga paborito</span>
        </div>
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="iyong@email.com">
          </div>
          <div class="error-message" id="loginError"></div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="••••••••">
          </div>
        </div>
        <button class="btn-submit" id="loginSubmitBtn">Mag-sign In <i class="fas fa-arrow-right"></i></button>
        <p class="switch-text">Wala pang account? <a id="switchToSignup">Sumali ngayon</a></p>
      </div>

      <div id="signupForm" class="form">
        <div class="demo-note">
          <i class="fas fa-gem"></i>
          <span>Libre at bukas sa lahat!</span>
        </div>
        <div class="form-group">
          <label>Pangalan</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="signupName" placeholder="Juan Dela Cruz">
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="signupEmail" placeholder="iyong@email.com">
          </div>
          <div class="error-message" id="signupError"></div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="signupPassword" placeholder="Hindi bababa sa 6 na character">
          </div>
        </div>
        <button class="btn-submit" id="signupSubmitBtn">Sumali <i class="fas fa-arrow-right"></i></button>
        <p class="switch-text">May account na? <a id="switchToLogin">Mag-sign In</a></p>
      </div>
    </div>

    <div class="guest-mode">
      <button class="guest-btn" id="guestBtn">
        <i class="fas fa-eye"></i> Mag-explore bilang Bisita
      </button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
<script src="firebase-config.js"></script>

<script>
  // Generate bubbles
  function generateBubbles() {
    const container = document.getElementById('bgAnimation');
    for (let i = 0; i < 30; i++) {
      const bubble = document.createElement('span');
      const size = Math.random() * 100 + 20;
      bubble.style.width = size + 'px';
      bubble.style.height = size + 'px';
      bubble.style.left = Math.random() * 100 + '%';
      bubble.style.animationDuration = Math.random() * 15 + 10 + 's';
      bubble.style.animationDelay = Math.random() * 10 + 's';
      container.appendChild(bubble);
    }
  }
  generateBubbles();

  // Dark Mode
  const darkToggle = document.getElementById('darkModeToggle');
  function initDarkMode() {
    if (localStorage.getItem('landingDarkMode') === 'enabled') {
      document.body.classList.add('dark-mode');
      darkToggle.innerHTML = '<i class="fas fa-sun"></i>';
    }
  }
  darkToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('landingDarkMode', isDark ? 'enabled' : 'disabled');
    darkToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  });
  initDarkMode();

  // Tab switching
  const loginTab = document.getElementById('loginTabBtn');
  const signupTab = document.getElementById('signupTabBtn');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const switchToSignup = document.getElementById('switchToSignup');
  const switchToLogin = document.getElementById('switchToLogin');

  function showLogin() {
    loginTab.classList.add('active');
    signupTab.classList.remove('active');
    loginForm.classList.add('active');
    signupForm.classList.remove('active');
  }

  function showSignup() {
    signupTab.classList.add('active');
    loginTab.classList.remove('active');
    signupForm.classList.add('active');
    loginForm.classList.remove('active');
  }

  loginTab.addEventListener('click', showLogin);
  signupTab.addEventListener('click', showSignup);
  if (switchToSignup) switchToSignup.addEventListener('click', showSignup);
  if (switchToLogin) switchToLogin.addEventListener('click', showLogin);

  // ========== FIREBASE AUTH - SIGN UP ==========
  window.doSignup = async function() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const errorEl = document.getElementById('signupError');

    if (!name || !email || !password) {
      errorEl.textContent = 'Punan ang lahat ng fields.';
      return;
    }
    if (password.length < 6) {
      errorEl.textContent = 'Ang password ay dapat 6 na character o higit pa.';
      return;
    }

    try {
      // Create user in Firebase Authentication
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      const user = userCredential.user;
      
      // Save user data to Firestore
      await db.collection('users').doc(user.uid).set({
        name: name,
        email: email,
        favorites: [],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      
      // Save to localStorage for quick access
      localStorage.setItem('lingwahero_currentUser', JSON.stringify({ name, email, uid: user.uid }));
      
      errorEl.textContent = '';
      window.location.href = 'index.html';
    } catch (error) {
      if (error.code === 'auth/email-already-in-use') {
        errorEl.textContent = 'May account na ang email na ito.';
      } else {
        errorEl.textContent = error.message;
      }
    }
  };

  // ========== FIREBASE AUTH - SIGN IN ==========
  window.doLogin = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');

    if (!email || !password) {
      errorEl.textContent = 'Punan ang lahat ng fields.';
      return;
    }

    try {
      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      const user = userCredential.user;
      
      // Get user data from Firestore
      const userDoc = await db.collection('users').doc(user.uid).get();
      const userData = userDoc.data();
      
      localStorage.setItem('lingwahero_currentUser', JSON.stringify({ 
        name: userData?.name || email.split('@')[0], 
        email: email, 
        uid: user.uid 
      }));
      
      errorEl.textContent = '';
      window.location.href = 'index.html';
    } catch (error) {
      errorEl.textContent = 'Mali ang email o password.';
    }
  };

  // Guest mode
  window.guestMode = function() {
    localStorage.removeItem('lingwahero_currentUser');
    window.location.href = 'index.html';
  };

  // Event listeners
  document.getElementById('loginSubmitBtn').onclick = () => window.doLogin();
  document.getElementById('signupSubmitBtn').onclick = () => window.doSignup();
  document.getElementById('guestBtn').onclick = () => window.guestMode();

  // Enter key submit
  document.getElementById('loginPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') window.doLogin();
  });
  document.getElementById('signupPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') window.doSignup();
  });

  // Check if already logged in
  auth.onAuthStateChanged((user) => {
    if (user && window.location.pathname.includes('login-signup.html')) {
      window.location.href = 'index.html';
    }
  });
</script>
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
<script src="firebase-config.js"></script>
</body>
</html>
