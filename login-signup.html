<!DOCTYPE html>
<html lang="fil">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lingwahero · Mag-sign In / Mag-sign Up</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: linear-gradient(135deg, #0038A8 0%, #002272 50%, #9a0d1b 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated Background */
    .bg-animation {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .bg-animation span {
      position: absolute;
      display: block;
      background: rgba(252, 209, 22, 0.08);
      border-radius: 50%;
      animation: float 20s infinite linear;
      pointer-events: none;
    }

    @keyframes float {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.5;
      }
      90% {
        opacity: 0.5;
      }
      100% {
        transform: translateY(-100vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* Main Container */
    .landing-container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Card */
    .landing-card {
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 48px;
      overflow: hidden;
      box-shadow: 0 32px 64px rgba(0, 0, 0, 0.3);
      animation: slideUp 0.6s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Hero Section inside Card */
    .card-hero {
      background: linear-gradient(135deg, #CE1126 0%, #0038A8 100%);
      padding: 48px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card-hero::before {
      content: "★";
      position: absolute;
      top: -30px;
      right: -30px;
      font-size: 140px;
      opacity: 0.1;
      color: #FCD116;
      pointer-events: none;
    }

    .hero-icon {
      font-size: 64px;
      color: #FCD116;
      margin-bottom: 16px;
      display: inline-block;
      animation: spin 8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .card-hero h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 32px;
      font-weight: 900;
      color: white;
      margin-bottom: 8px;
    }

    .card-hero p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }

    .flag-strip {
      width: 80px;
      height: 4px;
      background: linear-gradient(90deg, #0038A8 33%, #CE1126 33% 67%, #FCD116 67%);
      margin: 16px auto 0;
      border-radius: 2px;
    }

    /* Tabs */
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid #e8d8c8;
      background: white;
    }

    .tab-btn {
      flex: 1;
      padding: 18px;
      background: none;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: #8a7060;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }

    .tab-btn.active {
      color: #CE1126;
    }

    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 3px;
      background: #CE1126;
    }

    /* Forms */
    .form-container {
      padding: 32px;
    }

    .form {
      display: none;
    }

    .form.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #4a3728;
      margin-bottom: 8px;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      background: #f5f0ea;
      border: 1px solid #e8d8c8;
      border-radius: 16px;
      padding: 0 16px;
      transition: all 0.2s;
    }

    .input-wrapper:focus-within {
      border-color: #0038A8;
      box-shadow: 0 0 0 3px rgba(0, 56, 168, 0.1);
    }

    .input-wrapper i {
      color: #8a7060;
      font-size: 14px;
    }

    .input-wrapper input {
      flex: 1;
      border: none;
      background: transparent;
      padding: 14px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      color: #1a1206;
    }

    .input-wrapper input::placeholder {
      color: #b8a898;
    }

    .error-message {
      font-size: 12px;
      color: #CE1126;
      margin-top: 6px;
      min-height: 18px;
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #CE1126, #9a0d1b);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(206, 17, 38, 0.3);
    }

    .demo-note {
      background: #FFF8F0;
      border-left: 4px solid #FCD116;
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 12px;
      color: #4a3728;
    }

    .demo-note i {
      color: #FCD116;
      margin-right: 8px;
    }

    .switch-text {
      text-align: center;
      font-size: 13px;
      color: #8a7060;
      margin-top: 20px;
    }

    .switch-text a {
      color: #0038A8;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }

    /* Guest Mode */
    .guest-mode {
      text-align: center;
      padding: 16px 32px 24px;
      background: white;
      border-top: 1px solid #e8d8c8;
    }

    .guest-btn {
      background: transparent;
      border: 2px solid #e8d8c8;
      color: #4a3728;
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .guest-btn:hover {
      border-color: #0038A8;
      color: #0038A8;
    }

    /* Dark Mode */
    body.dark-mode .landing-card {
      background: rgba(26, 20, 9, 0.98);
    }

    body.dark-mode .auth-tabs {
      background: #1a1409;
      border-color: #2a2015;
    }

    body.dark-mode .tab-btn {
      color: #7a6a55;
    }

    body.dark-mode .tab-btn.active {
      color: #FCD116;
    }

    body.dark-mode .form-container {
      background: #1a1409;
    }

    body.dark-mode .form-group label {
      color: #c8b89a;
    }

    body.dark-mode .input-wrapper {
      background: #231b0f;
      border-color: #2a2015;
    }

    body.dark-mode .input-wrapper input {
      color: #f0e8dc;
    }

    body.dark-mode .demo-note {
      background: #231b0f;
      color: #c8b89a;
    }

    body.dark-mode .guest-mode {
      background: #1a1409;
      border-color: #2a2015;
    }

    body.dark-mode .guest-btn {
      border-color: #2a2015;
      color: #c8b89a;
    }

    /* Dark mode toggle */
    .dark-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
    }

    .dark-toggle-btn {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      backdrop-filter: blur(10px);
      transition: all 0.2s;
    }

    .dark-toggle-btn:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: scale(1.05);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .card-hero {
        padding: 32px 24px;
      }

      .card-hero h1 {
        font-size: 24px;
      }

      .form-container {
        padding: 24px;
      }
    }
  </style>
</head>
<body>

<div class="dark-toggle">
  <button class="dark-toggle-btn" id="darkModeToggle"><i class="fas fa-moon"></i></button>
</div>

<div class="bg-animation" id="bgAnimation"></div>

<div class="landing-container">
  <div class="landing-card">
    <!-- Hero Section -->
    <div class="card-hero">
      <div class="hero-icon">☀</div>
      <h1>Lingwahero</h1>
      <p>Diksiyonaryong Makabayan</p>
      <div class="flag-strip"></div>
    </div>

    <!-- Auth Tabs -->
    <div class="auth-tabs">
      <button class="tab-btn active" id="loginTabBtn">Mag-sign In</button>
      <button class="tab-btn" id="signupTabBtn">Mag-sign Up</button>
    </div>

    <!-- Login Form -->
    <div class="form-container">
      <div id="loginForm" class="form active">
        <div class="demo-note">
          <i class="fas fa-info-circle"></i>
          <span>Gumawa ng account o mag-login para ma-save ang iyong mga paborito</span>
        </div>
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="loginEmail" placeholder="iyong@email.com">
          </div>
          <div class="error-message" id="loginError"></div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="loginPassword" placeholder="••••••••">
          </div>
          <div class="error-message"></div>
        </div>
        <button class="btn-submit" id="loginSubmitBtn">Mag-sign In <i class="fas fa-arrow-right"></i></button>
        <p class="switch-text">Wala pang account? <a id="switchToSignup">Sumali ngayon</a></p>
      </div>

      <!-- Signup Form -->
      <div id="signupForm" class="form">
        <div class="demo-note">
          <i class="fas fa-gem"></i>
          <span>Libre at bukas sa lahat! Gumawa ng account upang mag-save ng mga paborito.</span>
        </div>
        <div class="form-group">
          <label>Pangalan</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="signupName" placeholder="Juan Dela Cruz">
          </div>
          <div class="error-message"></div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <div class="input-wrapper">
            <i class="fas fa-envelope"></i>
            <input type="email" id="signupEmail" placeholder="iyong@email.com">
          </div>
          <div class="error-message" id="signupError"></div>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="signupPassword" placeholder="Hindi bababa sa 6 na character">
          </div>
          <div class="error-message"></div>
        </div>
        <button class="btn-submit" id="signupSubmitBtn">Sumali <i class="fas fa-arrow-right"></i></button>
        <p class="switch-text">May account na? <a id="switchToLogin">Mag-sign In</a></p>
      </div>
    </div>

    <!-- Guest Mode -->
    <div class="guest-mode">
      <button class="guest-btn" id="guestBtn">
        <i class="fas fa-eye"></i> Mag-explore bilang Bisita
      </button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>

<script>
  // Generate floating background elements
  function generateBubbles() {
    const container = document.getElementById('bgAnimation');
    const bubbleCount = 30;
    for (let i = 0; i < bubbleCount; i++) {
      const bubble = document.createElement('span');
      const size = Math.random() * 100 + 20;
      bubble.style.width = size + 'px';
      bubble.style.height = size + 'px';
      bubble.style.left = Math.random() * 100 + '%';
      bubble.style.animationDuration = Math.random() * 15 + 10 + 's';
      bubble.style.animationDelay = Math.random() * 10 + 's';
      container.appendChild(bubble);
    }
  }
  generateBubbles();

  // Dark Mode
  const darkToggle = document.getElementById('darkModeToggle');
  function initDarkMode() {
    if (localStorage.getItem('landingDarkMode') === 'enabled') {
      document.body.classList.add('dark-mode');
      darkToggle.innerHTML = '<i class="fas fa-sun"></i>';
    }
  }
  darkToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('landingDarkMode', isDark ? 'enabled' : 'disabled');
    darkToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  });
  initDarkMode();

  // Tab switching
  const loginTab = document.getElementById('loginTabBtn');
  const signupTab = document.getElementById('signupTabBtn');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const switchToSignup = document.getElementById('switchToSignup');
  const switchToLogin = document.getElementById('switchToLogin');

  function showLogin() {
    loginTab.classList.add('active');
    signupTab.classList.remove('active');
    loginForm.classList.add('active');
    signupForm.classList.remove('active');
  }

  function showSignup() {
    signupTab.classList.add('active');
    loginTab.classList.remove('active');
    signupForm.classList.add('active');
    loginForm.classList.remove('active');
  }

  loginTab.addEventListener('click', showLogin);
  signupTab.addEventListener('click', showSignup);
  if (switchToSignup) switchToSignup.addEventListener('click', showSignup);
  if (switchToLogin) switchToLogin.addEventListener('click', showLogin);

  // Firebase will be initialized in firebase-config.js
  // For now, use localStorage as fallback until Firebase is set up
  
  function getUsers() {
    return JSON.parse(localStorage.getItem('lingwahero_users') || '[]');
  }

  function saveUsers(users) {
    localStorage.setItem('lingwahero_users', JSON.stringify(users));
  }

  function setCurrentUser(user) {
    localStorage.setItem('lingwahero_currentUser', JSON.stringify(user));
  }

  function redirectToIndex() {
    window.location.href = 'index.html';
  }

  // Login function
  function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorEl = document.getElementById('loginError');

    if (!email || !password) {
      errorEl.textContent = 'Punan ang lahat ng fields.';
      return;
    }

    const users = getUsers();
    const user = users.find(u => u.email === email && u.password === password);

    if (!user) {
      errorEl.textContent = 'Mali ang email o password.';
      return;
    }

    errorEl.textContent = '';
    setCurrentUser({ name: user.name, email: user.email });
    redirectToIndex();
  }

  // Signup function
  function doSignup() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const errorEl = document.getElementById('signupError');

    if (!name || !email || !password) {
      errorEl.textContent = 'Punan ang lahat ng fields.';
      return;
    }

    if (password.length < 6) {
      errorEl.textContent = 'Ang password ay dapat 6 na character o higit pa.';
      return;
    }

    const users = getUsers();
    if (users.find(u => u.email === email)) {
      errorEl.textContent = 'May account na ang email na ito.';
      return;
    }

    const newUser = { name, email, password };
    users.push(newUser);
    saveUsers(users);
    setCurrentUser({ name, email });
    redirectToIndex();
  }

  function guestMode() {
    localStorage.removeItem('lingwahero_currentUser');
    redirectToIndex();
  }

  // Event listeners
  document.getElementById('loginSubmitBtn').addEventListener('click', doLogin);
  document.getElementById('signupSubmitBtn').addEventListener('click', doSignup);
  document.getElementById('guestBtn').addEventListener('click', guestMode);

  // Enter key submit
  document.getElementById('loginPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('signupPassword').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') doSignup();
  });

  // Check if already logged in
  const currentUser = localStorage.getItem('lingwahero_currentUser');
  if (currentUser) {
    redirectToIndex();
  }
</script>
</body>
</html>
